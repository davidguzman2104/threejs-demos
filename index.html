<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2.3 Manipulación de escenarios 3D</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/consola-de-juego.png">


  <!-- Bootstrap 5 para el navbar y layout -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tus estilos -->
  <link rel="stylesheet" href="css/main.css" />

  <!-- Importmap apuntando a TU estructura -->
  <script type="importmap">
    {
      "imports": {
        "three": "./build/three.module.js",
        "three/addons/": "./jsm/"
      }
    }
  </script>
</head>
<body class="bg-dark text-light">

  <!-- Navbar -->
<nav class="custom-navbar">
  <div class="nav-title">Mis Demos</div>

  <div class="radio-inputs">
    <label class="radio">
      <input type="radio" name="demo" value="minecraft" checked />
      <span class="name">Minecraft</span>
    </label>
    <label class="radio">
      <input type="radio" name="demo" value="map" />
      <span class="name">Map</span>
    </label>
    <label class="radio">
      <input type="radio" name="demo" value="orbit" />
      <span class="name">Orbit</span>
    </label>
    <label class="radio">
      <input type="radio" name="demo" value="pointer" />
      <span class="name">Pointer Lock</span>
    </label>
  </div>

  <div class="nav-subtitle">Ambientes Virtuales</div>
</nav>


  <!-- CONTENEDOR DEL CANVAS / DEMO -->
  <main class="container-fluid p-0">
    <div id="stage" class="stage"></div>

    <!-- Overlay solo para PointerLock -->
    <div id="blocker" class="blocker d-none">
      <div id="instructions" class="instructions">
        <p class="display-6 mb-3">Click para jugar</p>
        <p>WASD: mover · SPACE: saltar · Mouse: mirar</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="py-3 bg-black text-secondary small">
    <div class="container d-flex flex-wrap justify-content-between">
      <span>© <span id="year"></span> David Fidel Guzmán Sánchez- 21200255 — Programador</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
